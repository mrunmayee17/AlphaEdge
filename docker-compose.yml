services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - FINCAST_CHECKPOINT_PATH=/app/models/fincast/v1.pth
      - FINCAST_RESULTS_ZIP_PATH=/app/models/fincast/fincast_results.zip
      - FINCAST_ADAPTER_SUBDIR=lora_adapter_best
      - FINCAST_DEVICE=cpu
      - FINCAST_CONTEXT_LENGTH=128
      - FINCAST_STEP_HORIZON=5
      - FINCAST_NUM_EXPERTS=4
      - FINCAST_GATING_TOP_N=2
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/app/.hf_cache
      - /Users/mrunmayeerane/Downloads/v1.pth:/app/models/fincast/v1.pth:ro
      - /Users/mrunmayeerane/Downloads/fincast_results.zip:/app/models/fincast/fincast_results.zip:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:
  hf_cache:
